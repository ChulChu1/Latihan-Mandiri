<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Wisata Indonesiaku</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #map {
            height: 100vh;
            width: 100%;
            border: 5px solid #00060c;
            border-radius: 15px;
        }
        
        .info-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(255,255,255,0.9);
            padding: 10px 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 1000;
            font-size: 12px;
            pointer-events: none;
        }
        
        .custom-control {
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="info-panel">
        <strong>🏝️ Selamat Datang di Peta Wisata Nusantara</strong><br>
        Geser dan zoom untuk menjelajahi peta
    </div>

    <script>
        // ==========================================
        // 1. INISIALISASI PETA (KOORDINAT & ZOOM)
        // ==========================================
        var map = L.map('map').setView([-6.9146, 107.6098], 13);
        // KOORDINAT: Gedung Sate, Bandung
        // ZOOM: 13 (0 = dunia, 18 = sangat dekat)
        // ==========================================
        // TAMBAHAN 3 MARKER BARU (SOAL 5)
        // ==========================================
        // Marker 1: Kebun Binatang Bandung
        var marker1 = L.marker([-6.9000, 107.6185]).addTo(map);
        marker1.bindPopup('<b>Kebun Binatang Bandung</b><br>Tempat wisata keluarga di Bandung');
        // Marker 2: Saung Angklung Udjo
        var marker2 = L.marker([-6.8918, 107.6670]).addTo(map);
        marker2.bindPopup('<b>Saung Angklung Udjo</b><br>Tempat pertunjukan budaya tradisional Sunda');
        // Marker 3: Taman Hutan Raya Ir. H. Djuanda
        var marker3 = L.marker([-6.8390, 107.610]).addTo(map);
        marker3.bindPopup('<b>Taman Hutan Raya Ir. H. Djuanda</b><br>Area hijau di kawasan Bandung');
// Opsional: Tambahkan marker ke layer control
var overlayMaps = {
    "Marker Utama": marker,
    "Kebun Binatang Bandung": marker1,
    "Saung Angklung Udjo": marker2,
    "Taman Hutan Raya Ir. H. Djuanda": marker3
};         
        
        // ==========================================
        // 2. TAMBAHKAN BASEMAP (PETA DASAR)
        // ==========================================
        L.tileLayer('https://mt1.google.com/vt/lyrs=r&x={x}&y={y}&z={z}', {
            attribution: '&copy; <a href="https://www.googlemaps.org/copyright">Google Maps</a> contributors',
            maxZoom: 19
        }).addTo(map);
        
        // ==========================================
        // 3. TAMBAHKAN SCALE BAR (SKALA PETA)
        // ==========================================
        L.control.scale({
            metric: true,
            imperial: false,
            position: 'bottomright'
        }).addTo(map);
        
        // ==========================================
        // 4. TAMBAHKAN MARKER CONTOH
        // ==========================================
        var marker = L.marker([-6.9146, 107.6098]).addTo(map);
        marker.bindPopup('<b>Gedung Sate</b><br>Bandung, Jawa Barat');
        
        // ==========================================
        // 5. TAMBAHKAN LAYER CONTROL
        // ==========================================
        var baseMaps = {
            "Street Map": L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
        };
        
        var overlayMaps = {
            "Marker": marker
        };
        
        L.control.layers(baseMaps, overlayMaps).addTo(map);
        
        console.log('Peta berhasil dimuat!');
    </script>
</body>
</html>
